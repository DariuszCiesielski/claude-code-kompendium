project:
  type: book
  output-dir: _output

book:
  title: "Kompendium Claude Code"
  subtitle: "Od podstaw po zaawansowane wzorce multi-agentowe"
  author: "Dariusz Ciesielski"
  date: "2026-04-10"
  language: pl
  reader-mode: true
  chapters:
    - index.qmd
    - part: "Podstawy"
      chapters:
        - guide/01-wprowadzenie.qmd
        - guide/02-podstawowe-komendy.qmd
        - guide/03-system-skilli.qmd
    - part: "Zaawansowane techniki"
      chapters:
        - guide/04-optymalizacja-tokenow.qmd
        - guide/05-praca-z-projektami.qmd
        - guide/06-automatyzacje.qmd
        - guide/08-debugowanie.qmd
    - part: "Multi-agent"
      chapters:
        - guide/07-multi-agent.qmd
        - guide/11-multi-agent-frameworks.qmd
    - part: "Integracje i wzorce"
      chapters:
        - guide/09-integracje.qmd
        - guide/10-najlepsze-praktyki.qmd
        - guide/12-prompt-patterns.qmd
  appendices:
    - cheatsheet/cheatsheet.qmd

format:
  typst:
    extend: claude-book
    toc-depth: 2
    font-size: 11pt
    supplement-chapter: "Rozdział"
    supplement-part: "Część"
    outline-font-size: 1.1em
    part-style: 2
    mainfont: "Source Serif 4"
    monofont: "JetBrains Mono NL"
    include-in-header:
      - text: |
          #set text(lang: "pl")
          #show raw.where(block: true): set text(size: 0.9em)
